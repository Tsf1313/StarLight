name = "eventflow-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database (SQLite on Cloudflare)
[[d1_databases]]
binding = "DB"
database_name = "eventflow-prod"
database_id = "your-database-id-here"  # You'll get this after creating D1

# R2 Bucket (Object Storage)
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "eventflow-uploads"

# KV Namespace (Session/State Storage - for current event, etc.)
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id-here"  # Create via wrangler: wrangler kv:namespace create eventflow-state

# Environment Variables
[env.production]
vars = { ENVIRONMENT = "production", API_URL = "https://api.eventflow.hamstersame.org", R2_DOMAIN = "eventflow-uploads.your-account.r2.dev" }

[env.staging]
vars = { ENVIRONMENT = "staging", API_URL = "https://staging-api.eventflow.hamstersame.org", R2_DOMAIN = "staging-uploads.your-account.r2.dev" }

# Routes for production domain
[env.production.routes]
pattern = "api.eventflow.hamstersame.org/api/*"
zone_name = "hamstersame.org"
